services:

  gateway-api:
    build:
      context: ..
      dockerfile: src/Gateway.Api/Dockerfile
    container_name: gateway-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - customers-api
      - positions-api
      - collateral-api

  customers-api:
    build:
      context: ..
      dockerfile: src/Customers.Api/Dockerfile
    container_name: customers-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  positions-api:
    build:
      context: ..
      dockerfile: src/Positions.Api/Dockerfile
    container_name: positions-api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  collateral-api:
    build:
      context: ..
      dockerfile: src/Collateral.Api/Dockerfile
    container_name: collateral-api
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Services__PositionsBaseUrl=http://positions-api:8080
    depends_on:
      - positions-api